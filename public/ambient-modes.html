<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncNest | Choose Oasis</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body class="room-page">
  <main class="ambient-shell">
    <section class="card ambient-panel">
      <div class="ambient-top">
        <div>
          <p class="eyebrow">Ambient Modes</p>
          <h1>Choose Your Oasis</h1>
        </div>
        <button id="backToRoomBtn" class="btn btn-secondary" type="button">Back to room</button>
      </div>
      <div class="ambient-grid">
        <article class="oasis-card" data-mode="pink-sunset-cafe">
          <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1200&q=80" alt="Pink Sunset Cafe" />
          <div class="oasis-card-info">
            <h4>Pink Sunset Cafe</h4>
            <p>Soft jazz and espresso calm.</p>
            <button class="btn btn-primary oasis-select" type="button">Select Mode</button>
          </div>
        </article>
        <article class="oasis-card" data-mode="rainy-library">
          <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1200&q=80" alt="Rainy Library" />
          <div class="oasis-card-info">
            <h4>Rainy Library</h4>
            <p>Rain + pages + deep focus.</p>
            <button class="btn btn-primary oasis-select" type="button">Select Mode</button>
          </div>
        </article>
        <article class="oasis-card" data-mode="cozy-bedroom">
          <img src="https://images.unsplash.com/photo-1616594039964-3f0d5c5f4f8e?auto=format&fit=crop&w=1200&q=80" alt="Cozy Bedroom" />
          <div class="oasis-card-info">
            <h4>Cozy Bedroom</h4>
            <p>Warm lights and comfort beats.</p>
            <button class="btn btn-primary oasis-select" type="button">Select Mode</button>
          </div>
        </article>
        <article class="oasis-card" data-mode="botanical-garden">
          <img src="https://images.unsplash.com/photo-1463320726281-696a485928c7?auto=format&fit=crop&w=1200&q=80" alt="Botanical Garden" />
          <div class="oasis-card-info">
            <h4>Botanical Garden</h4>
            <p>Nature ambience and calm clarity.</p>
            <button class="btn btn-primary oasis-select" type="button">Select Mode</button>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="/ambient-modes.js" defer></script>
</body>

</html>
